name: Test Coverage Check

on:
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'bin/check-test-coverage.sh'
      - '.github/workflows/test-coverage-check.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
    cancel-in-progress: true

jobs:
    check-test-coverage:
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-test-check') && !contains(github.event.pull_request.labels.*.name, 'dependencies') }}
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Check test coverage for new functions
              run: bash bin/check-test-coverage.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
