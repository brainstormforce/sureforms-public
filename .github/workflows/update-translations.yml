name: Update Translations

on:
  issue_comment:
    types: [created]

# Only allow one i18n job per PR at a time.
concurrency:
  group: i18n-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  i18n:
    # Only trusted users may trigger a run — this job executes branch build
    # scripts with secrets, so gate on the commenter's association.
    if: |
      github.event.comment.body == '/i18n' &&
      github.event.issue.pull_request != null &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest

    steps:
      # Acknowledge the command with a reaction
      - name: Add reaction to comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: rocket

      # Get PR metadata (head branch, fork detection)
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          HEAD_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name')
          IS_FORK=$(echo "$PR_JSON" | jq -r '.head.repo.full_name != .base.repo.full_name')

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"
          echo "is_fork=$IS_FORK" >> "$GITHUB_OUTPUT"

      # Block fork PRs — secrets are not available
      - name: Block fork PRs
        if: steps.pr.outputs.is_fork == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**i18n update skipped**: This PR is from a fork. Translation updates require repository secrets and cannot run on fork PRs."
          exit 1

      # Notify that the workflow has started
      - name: Comment starting
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Translations update started** :hourglass_flowing_sand:
          Building and generating translations for 7 languages (nl, fr, de, es, it, pt, pl)...
          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      # Checkout the actual PR branch (not default branch)
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - name: Install WP-CLI
        run: |
          curl -sSfL -o wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info

      - name: Install dependencies
        run: npm ci

      # Build first so makepot picks up all the latest strings
      - name: Build
        run: npm run build

      # Run the full i18n pipeline (makepot -> po -> gpt-translate -> mo -> json)
      - name: Run i18n script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          bash bin/i18n.sh

      # Check if any files changed
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            CHANGED_FILES=$(git diff --name-only | wc -l | tr -d ' ')
            echo "file_count=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          fi

      # Push the i18n branch at the current PR-head tip. This only creates a
      # branch ref pointing at an existing commit — no new (unverified) commit
      # object is introduced here.
      - name: Create i18n branch
        if: steps.changes.outputs.changed == 'true'
        env:
          # Pass via env so the branch name can't inject shell commands.
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          BRANCH="i18n/$HEAD_REF"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git push --force origin "HEAD:refs/heads/$BRANCH"

      # Commit the generated translation files through the GitHub GraphQL API
      # so the commit is signed by GitHub's GPG key and shows as "Verified"
      # (a plain `git push` over HTTPS is never signed). Pinned to the v0.2.20
      # commit SHA for supply-chain safety.
      - name: Commit translations (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        with:
          commit_message: |
            chore: update i18n translations

            Auto-generated by /i18n command on PR #${{ github.event.issue.number }}
          repo: ${{ github.repository }}
          branch: ${{ env.BRANCH }}
          file_pattern: '.'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Open the translations PR against the original PR's head branch.
      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass via env so the base branch name can't inject shell commands.
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          PR_URL=$(gh pr create \
            --title "chore: update i18n translations" \
            --body "This PR updates translation files for 7 languages (nl, fr, de, es, it, pt, pl).

          Triggered by \`/i18n\` command on #${{ github.event.issue.number }}." \
            --base "$HEAD_REF" \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      # Comment on the original PR with a link to the translations PR
      - name: Comment success
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Translations PR created** :white_check_mark:
          ${{ steps.changes.outputs.file_count }} files changed across 7 languages.
          Review and merge: ${{ steps.create_pr.outputs.pr_url }}"

      - name: Comment no changes
        if: steps.changes.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**No translation changes** :white_check_mark:
          All translation files are already up to date."

      # On any failure, comment with a link to the logs
      - name: Comment failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Translation update failed** :x:
          [View workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
