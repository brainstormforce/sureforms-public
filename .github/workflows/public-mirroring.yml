name: Mirror the Repository.
# Mirror the Spectra repository publically on every release.

on:
  push:
    branches:
      # Run this whenever something is pushed to the default branch.
      - test-mirroring

jobs:
  mirror-repository:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the private code
        uses: actions/checkout@v4
        with:
          repository: brainstormforce/sureforms
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize mandatory git config
        run: |
          git config user.name "Sandesh - Automation"
          git config user.email "sandeshj+automation@bsf.io"

      - name: Remove any sensitive files
        run: |
          rm -rf .github/
          rm -rf .scripts/

      # - name: Reset history and squash commits
      #   run: |
      #     git checkout --orphan temp_branch  # Create a new orphan branch
      #     git add .
      #     git commit -m "Consolidated commit from private repo"
      #     git branch -D temp_branch_master  # Delete existing main branch if it exists
      #     git branch -m temp_branch_master  # Rename temp_branch to main

      - name: Push to the public repo
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.TEST_PAT }}
        run: |
          git remote add mirror https://github.com/adi3890/demo-sf.git
          git push mirror test-mirroring --force