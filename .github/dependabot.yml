version: 2
updates:
  # ─── GitHub Actions ───────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      github-actions:
        patterns:
          - "*"

  # ─── npm (root) ──────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "@wordpress/*"
        update-types:
          - "version-update:semver-major"
    groups:
      # Dev deps patch+minor — safe, automerge candidate
      npm-dev-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      # Prod patch — bug fixes, low risk
      npm-prod-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "patch"
        patterns:
          - "*"
      # Prod minor — new features, moderate risk
      npm-prod-minor:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
        patterns:
          - "*"
      # Security updates — batch ALL (including transitive) into one PR
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      # Major updates are NOT grouped — arrive as individual PRs

  # ─── npm (modules/gutenberg) ─────────────────────────
  # This directory has its own package.json. Without this
  # entry, security updates arrive as ungrouped individual PRs.
  - package-ecosystem: "npm"
    directory: "/modules/gutenberg"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "@wordpress/*"
        update-types:
          - "version-update:semver-major"
    groups:
      gutenberg-dev-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      gutenberg-prod-patch:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "patch"
        patterns:
          - "*"
      gutenberg-prod-minor:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
        patterns:
          - "*"
      gutenberg-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ─── Composer ─────────────────────────────────────────
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      composer-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      composer-security:
        applies-to: security-updates
        patterns:
          - "*"
