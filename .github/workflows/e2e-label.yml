name: E2E Tests (Label Triggered)

on:
  pull_request:
    types: [ labeled ]

concurrency:
  group: e2e-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Suite
    if: github.event.label.name == 'run-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start wp-env
        run: npm run play:up:gh

      - name: Create .env for tests
        run: |
          cat > .env <<EOF
          WP_BASE_URL=http://localhost:8888
          WP_ADMIN_USER=admin
          WP_ADMIN_PASS=password
          SRFM_PRO_LICENSE_KEY=${{ secrets.SRFM_PRO_LICENSE_KEY }}
          EOF

      - name: Run Playwright E2E tests
        run: npx playwright test --config=playwright.config.js --reporter=html,line
        env:
          CI: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.event.pull_request.number }}
          path: tests/play/test-results/
          retention-days: 7

      - name: Comment on PR with report link
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = `${emoji} **E2E Test Suite — ${status.toUpperCase()}**\n\n` +
              `[View full Playwright report](${runUrl})\n\n` +
              `> Triggered by label \`run-e2e\` on commit \`${{ github.sha }}\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body
            });

      - name: Stop wp-env
        if: always()
        run: npm run play:stop
