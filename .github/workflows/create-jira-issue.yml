name: Create Jira Issue

on:
  issues:
    types: [opened]

jobs:
  create-jira-issue:
    name: Create Jira card from GitHub issue
    runs-on: ubuntu-latest
    steps:
      - name: Map GitHub labels to Jira fields
        id: map_labels
        env:
          LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          # Default Jira issue type and priority.
          ISSUE_TYPE="Task"
          PRIORITY="Medium"
          JIRA_LABELS=""

          # Parse labels from the GitHub issue.
          LABEL_LIST=$(echo "$LABELS" | jq -r '.[]')

          for LABEL in $LABEL_LIST; do
            case "$LABEL" in
              bug)
                ISSUE_TYPE="Bug"
                ;;
              enhancement)
                ISSUE_TYPE="Story"
                ;;
              security)
                ISSUE_TYPE="Bug"
                PRIORITY="High"
                ;;
              documentation)
                ISSUE_TYPE="Task"
                ;;
              question)
                ISSUE_TYPE="Task"
                PRIORITY="Low"
                ;;
            esac

            # Map size labels to priority.
            case "$LABEL" in
              size:XL|size:XXL)
                PRIORITY="High"
                ;;
              size:L|size:M)
                PRIORITY="Medium"
                ;;
              size:S|size:XS)
                PRIORITY="Low"
                ;;
            esac

            # Forward relevant labels to Jira (skip size and meta labels).
            case "$LABEL" in
              size:*|"Release PR"|"title needs formatting"|skip-title-check|wip|WIP|"good first issue"|"help wanted"|duplicate|invalid|wontfix)
                ;;
              *)
                if [ -n "$JIRA_LABELS" ]; then
                  JIRA_LABELS="$JIRA_LABELS,\"$LABEL\""
                else
                  JIRA_LABELS="\"$LABEL\""
                fi
                ;;
            esac
          done

          echo "issue_type=$ISSUE_TYPE" >> "$GITHUB_OUTPUT"
          echo "priority=$PRIORITY" >> "$GITHUB_OUTPUT"
          echo "jira_labels=[$JIRA_LABELS]" >> "$GITHUB_OUTPUT"

      - name: Create Jira issue
        id: create_issue
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_TYPE: ${{ steps.map_labels.outputs.issue_type }}
          PRIORITY: ${{ steps.map_labels.outputs.priority }}
          JIRA_LABELS: ${{ steps.map_labels.outputs.jira_labels }}
        run: |
          # Build the Jira description with a link back to the GitHub issue.
          DESCRIPTION=$(printf "*GitHub Issue:* [#%s|%s]\n*Author:* %s\n\n----\n\n%s" \
            "$ISSUE_NUMBER" "$ISSUE_URL" "$ISSUE_AUTHOR" "$ISSUE_BODY")

          # Build JSON payload using jq (handles all escaping).
          PAYLOAD=$(jq -n \
            --arg summary "$ISSUE_TITLE" \
            --arg description "$DESCRIPTION" \
            --arg issuetype "$ISSUE_TYPE" \
            --arg priority "$PRIORITY" \
            --argjson labels "$JIRA_LABELS" \
            '{
              fields: {
                project: { key: "SF" },
                summary: $summary,
                description: $description,
                issuetype: { name: $issuetype },
                priority: { name: $priority },
                labels: $labels
              }
            }')

          # Base64 encode credentials without line wrapping (-w 0).
          AUTH=$(echo -n "${JIRA_USERNAME}:${JIRA_TOKEN}" | base64 -w 0)

          # Create the Jira issue via REST API v2.
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${JIRA_BASE_URL}/rest/api/2/issue")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            JIRA_KEY=$(echo "$BODY" | jq -r '.key')
            JIRA_URL="${JIRA_BASE_URL}/browse/${JIRA_KEY}"
            echo "jira_key=$JIRA_KEY" >> "$GITHUB_OUTPUT"
            echo "jira_url=$JIRA_URL" >> "$GITHUB_OUTPUT"
            echo "Created Jira issue: $JIRA_KEY ($JIRA_URL)"
          else
            echo "Failed to create Jira issue (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

      - name: Prepend Jira key to GitHub issue title
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_KEY: ${{ steps.create_issue.outputs.jira_key }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --title "${JIRA_KEY} - ${{ github.event.issue.title }}"

      - name: Comment on GitHub issue with Jira link
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_KEY: ${{ steps.create_issue.outputs.jira_key }}
          JIRA_URL: ${{ steps.create_issue.outputs.jira_url }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🔗 Jira issue created: [${JIRA_KEY}](${JIRA_URL})"
