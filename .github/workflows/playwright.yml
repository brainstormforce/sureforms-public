name: Playwright E2E Tests

on:
  pull_request:
    types: [ labeled ]
  workflow_dispatch:
    inputs:
      clean_env:
        description: 'Run env:clean before starting (full DB wipe — use when env is broken)'
        type: boolean
        default: false

concurrency:
  group: playwright-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E Suite
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.15.0'

      - name: Restore node_modules cache
        id: npm-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Restore Playwright browser cache
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('node_modules/@playwright/test/package.json') }}
          restore-keys: playwright-chromium-

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v4
        with:
          path: assets/
          key: build-${{ hashFiles('src/blocks/**', 'src/components/**', 'sass/**', 'webpack.config.js') }}
          restore-keys: build-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Build plugin assets
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: npm run build

      - name: Install Playwright browsers (no cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Clean wp-env (on-demand only)
        if: ${{ inputs.clean_env == true }}
        run: npm run env:clean

      - name: Start wp-env
        run: npm run play:up:gh

      - name: Wait for WordPress to be ready
        run: |
          echo "Waiting for WordPress at http://localhost:8888..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/wp-login.php)
            if [ "$STATUS" = "200" ]; then
              echo "WordPress is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "WordPress did not become ready in time"
          exit 1

      - name: Verify WordPress REST API is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/wp-json/)
          echo "REST API status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "REST API not reachable — check .htaccess and Apache config"
            exit 1
          fi

      - name: Run Playwright E2E tests
        run: npx playwright test --config=playwright.config.js
        env:
          CI: true
          WP_ADMIN_USER: admin
          WP_ADMIN_PASS: password

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.pull_request.number || github.run_id }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: `${emoji} **Playwright E2E — ${status.toUpperCase()}**\n\n[View full report](${runUrl})\n\n> Triggered by \`e2e\` label on \`${{ github.sha }}\``
            });

      - name: Stop wp-env
        if: always()
        run: npm run play:stop
